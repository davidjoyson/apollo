<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<title>To-do</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:  #fbf7ef;
    --rule:   #c9d8e8;
    --ink:    #34322e;
    --pencil: #5b5750;
    --margin: #e7a9a3;
    --red:    #d9544d;
    --blue:   #2e6fb7;
    --green:  #3a9e6e;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }

  body {
    font-family: "Kalam", "Comic Sans MS", cursive;
    color: var(--ink);
    background-color: var(--paper);
    background-image:
      linear-gradient(90deg, transparent 38px, var(--margin) 38px, var(--margin) 39px, transparent 39px),
      repeating-linear-gradient(180deg, transparent 0 31px, var(--rule) 31px 32px);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
    min-height: 100vh;
  }

  .sheet {
    width: 100%;
    max-width: 480px;
    padding-left: 12px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  h1 {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: clamp(2.8rem, 12vw, 4rem);
    line-height: 0.9;
    margin: 0;
    display: inline-block;
    transform: rotate(-1.5deg);
  }

  .subtitle {
    display: block;
    font-size: 0.95rem;
    color: var(--pencil);
    margin-top: 6px;
    transform: rotate(0.5deg);
  }

  /* add row */
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .add-input {
    flex: 1;
    font-family: "Kalam", cursive;
    font-size: 1.1rem;
    color: var(--ink);
    background: transparent;
    border: 2px solid var(--ink);
    border-radius: 14px 10px 13px 9px / 9px 13px 10px 14px;
    padding: 8px 14px;
    outline: none;
    transition: box-shadow 0.15s ease;
  }
  .add-input::placeholder { color: var(--pencil); }
  .add-input:focus { box-shadow: 3px 3px 0 var(--ink); }

  .add-btn {
    font-family: "Caveat", cursive;
    font-size: 1.5rem;
    line-height: 1;
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px 10px 13px 9px / 9px 13px 10px 14px;
    padding: 6px 18px;
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .add-btn:hover { transform: translateY(-2px) rotate(-0.5deg); }
  .add-btn:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }

  /* list */
  .todo-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 2px solid var(--ink);
    border-radius: 16px 12px 15px 11px / 11px 15px 12px 16px;
    padding: 10px 14px;
    background: transparent;
    transition: opacity 0.25s ease;
    animation: slide-in 0.2s ease;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .todo-item.done { opacity: 0.5; }

  /* custom checkbox */
  .check-box {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid var(--ink);
    border-radius: 6px 4px 5px 3px / 3px 5px 4px 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: background 0.15s ease;
    user-select: none;
  }
  .todo-item.done .check-box {
    background: var(--ink);
    color: var(--paper);
  }
  .check-box::after { content: ''; }
  .todo-item.done .check-box::after { content: '✓'; }

  .todo-text {
    flex: 1;
    font-size: 1.05rem;
    line-height: 1.3;
    word-break: break-word;
    transition: text-decoration 0.15s ease;
  }
  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--pencil);
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--pencil);
    font-size: 1.1rem;
    padding: 2px 4px;
    line-height: 1;
    border-radius: 4px;
    transition: color 0.12s ease, transform 0.12s ease;
    opacity: 0;
  }
  .todo-item:hover .del-btn,
  .todo-item:focus-within .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); transform: scale(1.15); }
  .del-btn:focus-visible { outline: 2px solid var(--blue); opacity: 1; }

  /* footer row */
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    font-size: 0.88rem;
    color: var(--pencil);
    min-height: 28px;
  }

  .clear-btn {
    font-family: "Kalam", cursive;
    font-size: 0.88rem;
    background: none;
    border: none;
    color: var(--pencil);
    cursor: pointer;
    text-decoration: underline dotted;
    padding: 0;
    transition: color 0.12s ease;
  }
  .clear-btn:hover { color: var(--red); }
  .clear-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  .empty-hint {
    text-align: center;
    color: var(--pencil);
    font-size: 0.95rem;
    margin-top: 32px;
    transform: rotate(-0.5deg);
    display: none;
  }
  .empty-hint.show { display: block; }

  .back {
    display: block;
    text-align: center;
    margin-top: 40px;
    font-family: "Caveat", cursive;
    font-size: 1.3rem;
    color: var(--pencil);
    text-decoration: none;
    transition: transform 0.12s ease;
  }
  .back:hover { transform: translateX(-3px); }

  [data-theme="dark"] {
    --paper:  #1c1a17;
    --rule:   #232d3a;
    --ink:    #e8e4db;
    --pencil: #9a9087;
    --margin: #4a2222;
    --red:    #e06868;
    --blue:   #5a9fd4;
    --green:  #5ab88a;
  }

  .theme-btn {
    position: fixed;
    top: 14px;
    right: 14px;
    font-size: 1.1rem;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    z-index: 100;
    transition: transform 0.15s ease;
    padding: 0;
  }
  .theme-btn::before { content: '🌙'; }
  [data-theme="dark"] .theme-btn::before { content: '☀'; }
  .theme-btn:hover { transform: rotate(20deg) scale(1.08); }
  .theme-btn:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" aria-label="Toggle theme"></button>
<div class="sheet">
  <header>
    <h1>to-do</h1>
    <span class="subtitle">write it down, cross it off</span>
  </header>

  <div class="add-row">
    <input class="add-input" id="addInput" type="text" placeholder="add a task…" maxlength="200" autocomplete="off" />
    <button class="add-btn" id="addBtn">+</button>
  </div>

  <ul class="todo-list" id="todoList" aria-label="Tasks"></ul>
  <p class="empty-hint" id="emptyHint">nothing here yet — add something!</p>

  <div class="footer-row" id="footerRow">
    <span id="countLabel"></span>
    <button class="clear-btn" id="clearBtn">clear done</button>
  </div>

  <a class="back" href="index.html">← back</a>
</div>

<script>
(function () {
  var STORE_KEY = 'apollo-todos';

  var addInput   = document.getElementById('addInput');
  var addBtn     = document.getElementById('addBtn');
  var todoList   = document.getElementById('todoList');
  var emptyHint  = document.getElementById('emptyHint');
  var countLabel = document.getElementById('countLabel');
  var clearBtn   = document.getElementById('clearBtn');

  var todos = load();

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch (_) { return []; }
  }

  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(todos));
  }

  function render() {
    todoList.innerHTML = '';
    todos.forEach(function (todo, i) {
      var li = document.createElement('li');
      li.className = 'todo-item' + (todo.done ? ' done' : '');

      var box = document.createElement('button');
      box.className = 'check-box';
      box.setAttribute('aria-label', todo.done ? 'Mark incomplete' : 'Mark complete');
      box.addEventListener('click', function () { toggle(i); });

      var span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = todo.text;

      var del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.setAttribute('aria-label', 'Delete task');
      del.addEventListener('click', function () { remove(i); });

      li.appendChild(box);
      li.appendChild(span);
      li.appendChild(del);
      todoList.appendChild(li);
    });

    var remaining = todos.filter(function (t) { return !t.done; }).length;
    var total = todos.length;
    emptyHint.classList.toggle('show', total === 0);
    countLabel.textContent = total === 0 ? '' :
      remaining + ' left of ' + total;
    clearBtn.style.visibility = todos.some(function (t) { return t.done; }) ? 'visible' : 'hidden';
  }

  function addTask() {
    var text = addInput.value.trim();
    if (!text) return;
    todos.unshift({ text: text, done: false });
    addInput.value = '';
    save();
    render();
  }

  function toggle(i) {
    todos[i].done = !todos[i].done;
    save();
    render();
  }

  function remove(i) {
    todos.splice(i, 1);
    save();
    render();
  }

  addBtn.addEventListener('click', addTask);
  addInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') addTask();
  });

  clearBtn.addEventListener('click', function () {
    todos = todos.filter(function (t) { return !t.done; });
    save();
    render();
  });

  render();
})();
</script>
<script>
(function () {
  document.getElementById('themeBtn').addEventListener('click', function () {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<title>Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #fbf7ef;
    --rule:  #c9d8e8;
    --ink:   #34322e;
    --pencil:#5b5750;
    --margin:#e7a9a3;
    --red:   #d9544d;
    --blue:  #2e6fb7;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }

  body {
    font-family: "Kalam", "Comic Sans MS", cursive;
    color: var(--ink);
    background-color: var(--paper);
    background-image:
      linear-gradient(90deg, transparent 38px, var(--margin) 38px, var(--margin) 39px, transparent 39px),
      repeating-linear-gradient(180deg, transparent 0 31px, var(--rule) 31px 32px);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
    min-height: 100vh;
  }

  .sheet {
    width: 100%;
    max-width: 520px;
    padding-left: 12px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  h1 {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: clamp(3.2rem, 14vw, 5rem);
    line-height: 0.9;
    margin: 0;
    display: inline-block;
    transform: rotate(-1.5deg);
  }

  .subtitle {
    display: block;
    font-size: 1rem;
    color: var(--pencil);
    margin-top: 6px;
    transform: rotate(0.5deg);
  }

  /* game cards */
  .games {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    display: block;
    text-decoration: none;
    color: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 18px 14px 17px 13px / 13px 17px 14px 18px;
    padding: 20px 24px;
    background: transparent;
    transition: transform 0.13s ease, background 0.13s ease, box-shadow 0.13s ease;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px) rotate(-0.4deg);
    background: rgba(52,50,46,0.04);
    box-shadow: 3px 4px 0 var(--ink);
  }
  .card:focus-visible {
    outline: 3px solid var(--blue);
    outline-offset: 3px;
  }

  .card-icon {
    font-size: 2.4rem;
    line-height: 1;
    margin-bottom: 6px;
    display: block;
  }

  .card-title {
    font-family: "Caveat", cursive;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    margin: 0 0 4px;
  }

  .card-desc {
    font-size: 0.9rem;
    color: var(--pencil);
    margin: 0;
  }

  .card-arrow {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-family: "Caveat", cursive;
    font-size: 1.8rem;
    color: var(--pencil);
    transition: transform 0.13s ease;
  }
  .card:hover .card-arrow {
    transform: translateY(-50%) translateX(3px);
  }

  [data-theme="dark"] {
    --paper:  #1c1a17;
    --rule:   #232d3a;
    --ink:    #e8e4db;
    --pencil: #9a9087;
    --margin: #4a2222;
    --red:    #e06868;
    --blue:   #5a9fd4;
  }

  .theme-btn {
    position: fixed;
    top: 14px;
    right: 14px;
    font-size: 1.1rem;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    z-index: 100;
    transition: transform 0.15s ease;
    padding: 0;
  }
  .theme-btn::before { content: '🌙'; }
  [data-theme="dark"] .theme-btn::before { content: '☀'; }
  .theme-btn:hover { transform: rotate(20deg) scale(1.08); }
  .theme-btn:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" aria-label="Toggle theme"></button>
<div class="sheet">
  <header>
    <h1>hub</h1>
    <span class="subtitle">pick something to do</span>
  </header>

  <div class="games">
    <a class="card" href="tictactoe.html">
      <span class="card-icon">✕ ○</span>
      <h2 class="card-title">tic-tac-toe</h2>
      <p class="card-desc">2 players or vs an unbeatable computer</p>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="ascii-art.html">
      <span class="card-icon">@#%</span>
      <h2 class="card-title">ascii art</h2>
      <p class="card-desc">turn text or images into characters</p>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="pomodoro.html">
      <span class="card-icon">🍅</span>
      <h2 class="card-title">pomodoro</h2>
      <p class="card-desc">focus timer with short and long breaks</p>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="todo.html">
      <span class="card-icon">✓</span>
      <h2 class="card-title">to-do</h2>
      <p class="card-desc">write it down, cross it off</p>
      <span class="card-arrow">→</span>
    </a>
  </div>
</div>
<script>
(function () {
  document.getElementById('themeBtn').addEventListener('click', function () {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
})();
</script>
</body>
</html>
